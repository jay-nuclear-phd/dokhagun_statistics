<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title id="pageTitle">독하군 카페 글쓰기 현황</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./dokhagun.png" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./data/result.js"></script>
</head>
<body>
  <main>
    <h1 id="mainHeading">독하군 카페 글쓰기 현황</h1>

    <section class="summary">
      <div class="summary-left">
        <span id="monthLabel">모임</span>: <span id="period">-</span>
      </div>
      <div class="summary-right">
        업데이트 시각: <span id="updatedAt">불러오는 중...</span>
      </div>
    </section>

    <section class="chart-container">
      <div id="weekToggles" class="toggles"></div>
      <div class="canvas-wrapper">
        <canvas id="activityChart"></canvas>
      </div>
    </section>

    <div class="table-controls">
      <div id="colorLegend" class="legend"></div>
      <div class="search-wrapper">
        <input type="text" id="writerSearchInput" placeholder="작성자를 입력하세요..." oninput="renderTable()" />
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th class="sortable desc">
            <div class="header-content" onclick="handleSort('date', this.parentElement)">
              <span>날짜</span>
              <button class="filter-trigger" onclick="toggleFilter('date', event)">필터 ▾</button>
            </div>
            <div id="dateFilterDropdown" class="filter-dropdown" onclick="event.stopPropagation()">
              <div class="filter-actions">
                <button onclick="selectAll('date', true)">모두 선택</button>
                <button onclick="selectAll('date', false)">모두 해제</button>
              </div>
              <div id="dateFilterList" class="filter-list"></div>
            </div>
          </th>
          <th class="sortable">
            <div class="header-content" onclick="handleSort('writer', this.parentElement)">
              <span>작성자</span>
              <button class="filter-trigger" onclick="toggleFilter('writer', event)">필터 ▾</button>
            </div>
            <div id="writerFilterDropdown" class="filter-dropdown" onclick="event.stopPropagation()">
              <div class="filter-actions">
                <button onclick="selectAll('writer', true)">모두 선택</button>
                <button onclick="selectAll('writer', false)">모두 해제</button>
              </div>
              <div id="writerFilterList" class="filter-list"></div>
            </div>
          </th>
          <th>제목</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <script>
    let allItems = [];
    let myChart = null;
    let weeks = []; // { name, start, end }
    let activeWeekIdx = 0;
    
    // 정렬 및 필터 상태 관리
    let sortConfig = { key: 'date', direction: 'desc' };
    let filters = {
      date: new Set(),
      writer: new Set()
    };

    // 날짜 문자열을 로컬 Date 객체로 변환하는 헬퍼 (YYYY.MM.DD. 또는 YYYY-MM-DD 대응)
    function parseLocalDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split(/[-.]/).filter(p => p.trim() !== "");
      if (parts.length < 3) return null;
      const y = parseInt(parts[0], 10);
      const m = parseInt(parts[1], 10);
      const d = parseInt(parts[2], 10);
      // 로컬 시간대의 자정으로 생성
      return new Date(y, m - 1, d, 0, 0, 0, 0);
    }

    async function loadData() {
      const updatedAtEl = document.getElementById("updatedAt");
      
      if (window.naverCafeData) {
        processData(window.naverCafeData);
        return;
      }

      try {
        const res = await fetch("./data/result.json?ts=" + Date.now());
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        processData(data);
      } catch (error) {
        console.error("데이터 로드 실패:", error);
        updatedAtEl.textContent = "불러오기 실패 (CORS 또는 파일 없음)";
        updatedAtEl.style.color = "red";
      }
    }

    function processData(data) {
      allItems = data.items || [];
      document.getElementById("updatedAt").textContent = data.updated_at || "-";

      if (data.start_date && data.end_date) {
        document.getElementById("period").textContent = `${data.start_date} ~ ${data.end_date}`;
        setupWeeks(data.start_date, data.end_date);
      }

      updateTitles();
      initChart();
      renderTable();
    }

    function setupWeeks(startStr, endStr) {
      const start = parseLocalDate(startStr);
      const end = parseLocalDate(endStr);
      
      // "이번 달" 전체 범위
      weeks = [{ name: "이번 달", start: new Date(start), end: new Date(end) }];

      let currentStart = new Date(start);
      let weekNum = 1;

      while (currentStart <= end) {
        let currentEnd = new Date(currentStart);
        currentEnd.setDate(currentEnd.getDate() + 6); // 월~일 (7일)
        
        // 데이터 종료일을 넘지 않도록
        const weekEnd = currentEnd > end ? new Date(end) : currentEnd;
        
        weeks.push({
          name: `${weekNum}주차`,
          start: new Date(currentStart),
          end: new Date(weekEnd)
        });

        currentStart.setDate(currentStart.getDate() + 7);
        weekNum++;
      }

      const togglesDiv = document.getElementById("weekToggles");
      togglesDiv.innerHTML = weeks.map((week, idx) => `
        <button class="toggle-btn ${idx === 0 ? 'active' : ''}" onclick="changePeriod(${idx})">
          ${week.name}
        </button>
      `).join("");

      updateColorLegend();
    }

    function updateColorLegend() {
      const legendDiv = document.getElementById("colorLegend");
      // "이번 달"을 제외한 실제 주차들만 범례에 표시 (1주차부터)
      legendDiv.innerHTML = weeks.slice(1).map((week, idx) => `
        <div class="legend-item">
          <div class="legend-color week-row-${idx + 1}"></div>
          <span>${week.name}</span>
        </div>
      `).join("");
    }

    function initChart() {
      updateChart(0);
    }

    function changePeriod(idx) {
      activeWeekIdx = idx;
      updateChart(idx);
      renderTable();
    }

    function updateChart(weekIdx) {
      const btns = document.querySelectorAll(".toggle-btn");
      btns.forEach((btn, i) => {
        btn.classList.toggle("active", i === weekIdx);
      });

      const targetWeek = weeks[weekIdx];
      
      let goal = 3;
      if (weekIdx === 0) {
        const weekCount = weeks.length - 1;
        goal = weekCount * 3;
      }

      const filtered = allItems.filter(item => {
        const postDate = parseLocalDate(item.date);
        if (!postDate) return false;
        return postDate >= targetWeek.start && postDate <= targetWeek.end;
      });

      const stats = {};
      filtered.forEach(item => {
        stats[item.writer] = (stats[item.writer] || 0) + 1;
      });

      const sortedWriters = Object.entries(stats)
        .sort((a, b) => a[0].localeCompare(b[0]));

      const labels = sortedWriters.map(s => s[0]);
      const dataValues = sortedWriters.map(s => s[1]);

      const backgroundColors = dataValues.map(v => 
        v >= goal ? 'rgba(54, 162, 235, 0.8)' : 'rgba(255, 99, 132, 0.3)'
      );
      const borderColors = dataValues.map(v => 
        v >= goal ? 'rgba(54, 162, 235, 1)' : 'rgba(255, 99, 132, 0.5)'
      );

      const ctx = document.getElementById('activityChart').getContext('2d');
      if (myChart) myChart.destroy();

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '작성 글 수',
            data: dataValues,
            backgroundColor: backgroundColors,
            borderColor: borderColors,
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 },
              suggestedMax: goal + 2
            }
          },
          plugins: {
            legend: { display: false }
          }
        },
        plugins: [{
          id: 'goalLine',
          afterDraw: (chart) => {
            const { ctx, chartArea: { left, right }, scales: { y } } = chart;
            const yPos = y.getPixelForValue(goal);
            
            ctx.save();
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 99, 132, 0.8)';
            ctx.moveTo(left, yPos);
            ctx.lineTo(right, yPos);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255, 99, 132, 1)';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`목표: ${goal}개`, right, yPos - 5);
            ctx.restore();
          }
        }]
      });
    }

    function updateTitles() {
      if (allItems.length === 0) return;

      const yearCount = {};
      const monthCount = {};

      allItems.forEach(item => {
        const d = parseLocalDate(item.date);
        if (!d) return;
        const year = d.getFullYear();
        const month = d.getMonth() + 1;
        yearCount[year] = (yearCount[year] || 0) + 1;
        monthCount[month] = (monthCount[month] || 0) + 1;
      });

      const bestYear = Object.keys(yearCount).reduce((a, b) => (yearCount[a] > yearCount[b] ? a : b), "");
      const bestMonth = Object.keys(monthCount).reduce((a, b) => (monthCount[a] > monthCount[b] ? a : b), "");

      if (bestYear && bestMonth) {
        document.getElementById("pageTitle").textContent = `독하군 카페 ${bestYear}년 ${bestMonth}월 모임 글쓰기 현황`;
        document.getElementById("mainHeading").textContent = `📚 독하군 카페 ${bestYear}년 ${bestMonth}월 모임 글쓰기 현황`;
        document.getElementById("monthLabel").textContent = `${bestMonth}월 모임`;
      }
    }

    function toggleFilter(key, event) {
      event.stopPropagation();
      const dropdown = document.getElementById(`${key}FilterDropdown`);
      const isShow = dropdown.classList.contains('show');
      
      document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
      
      if (!isShow) {
        populateFilterList(key);
        dropdown.classList.add('show');
      }
    }

    function populateFilterList(key) {
      const listDiv = document.getElementById(`${key}FilterList`);
      const targetWeek = weeks[activeWeekIdx];
      
      const uniqueValues = [...new Set(allItems
        .filter(item => {
          const postDate = parseLocalDate(item.date);
          if (!postDate) return false;
          return postDate >= targetWeek.start && postDate <= targetWeek.end;
        })
        .map(item => String(item[key] || ""))
      )].sort();

      if (filters[key].size === 0) {
        uniqueValues.forEach(v => filters[key].add(v));
      }

      listDiv.innerHTML = uniqueValues.map(val => `
        <label class="filter-item">
          <input type="checkbox" ${filters[key].has(val) ? 'checked' : ''} 
            onchange="handleFilterChange('${key}', '${val}', this.checked)" />
          <span>${escapeHtml(val)}</span>
        </label>
      `).join("");
    }

    function handleFilterChange(key, value, checked) {
      if (checked) {
        filters[key].add(value);
      } else {
        filters[key].delete(value);
      }
      renderTable();
    }

    function selectAll(key, checked) {
      const listDiv = document.getElementById(`${key}FilterList`);
      const checkboxes = listDiv.querySelectorAll('input[type="checkbox"]');
      
      checkboxes.forEach(cb => {
        cb.checked = checked;
        const val = cb.parentElement.querySelector('span').textContent.trim();
        if (checked) filters[key].add(val);
        else filters[key].delete(val);
      });
      
      renderTable();
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
    });

    function handleSort(key, el) {
      if (sortConfig.key === key) {
        sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortConfig.key = key;
        sortConfig.direction = 'asc';
      }

      document.querySelectorAll('.sortable').forEach(th => {
        th.classList.remove('asc', 'desc');
      });
      el.classList.add(sortConfig.direction);

      renderTable();
    }

    function getWeekIdx(dateStr) {
      const postDate = parseLocalDate(dateStr);
      if (!postDate) return -1;
      
      for (let i = 1; i < weeks.length; i++) {
        if (postDate >= weeks[i].start && postDate <= weeks[i].end) {
          return i;
        }
      }
      return -1;
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      const targetWeek = weeks[activeWeekIdx];
      const writerSearchTerm = document.getElementById("writerSearchInput").value.trim().toLowerCase();

      let filtered = allItems.filter(item => {
        // 1. 기간 필터링
        const postDate = parseLocalDate(item.date);
        if (!postDate) return false;
        if (!(postDate >= targetWeek.start && postDate <= targetWeek.end)) return false;

        // 2. 작성자 이름 검색 필터링
        if (writerSearchTerm && !String(item.writer || "").toLowerCase().includes(writerSearchTerm)) {
          return false;
        }

        // 3. 컬럼별 체크박스 필터링
        const valDate = String(item.date || "");
        const valWriter = String(item.writer || "");
        
        const matchDate = filters.date.size === 0 || filters.date.has(valDate);
        const matchWriter = filters.writer.size === 0 || filters.writer.has(valWriter);
        
        return matchDate && matchWriter;
      });

      filtered.sort((a, b) => {
        let valA = String(a[sortConfig.key] || "");
        let valB = String(b[sortConfig.key] || "");
        let comparison = valA.localeCompare(valB);
        return sortConfig.direction === 'asc' ? comparison : -comparison;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #999;">결과가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(item => {
        const weekIdx = getWeekIdx(item.date);
        const weekClass = weekIdx !== -1 ? `week-row-${weekIdx}` : '';
        
        return `
          <tr class="${weekClass}">
            <td>${escapeHtml(item.date)}</td>
            <td>${escapeHtml(item.writer)}</td>
            <td style="text-align: left;">${escapeHtml(item.title)}</td>
          </tr>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadData();
  </script>
</body>
</html>
