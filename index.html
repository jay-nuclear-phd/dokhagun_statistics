<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>네이버 카페 4월 글 수집 현황</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>네이버 카페 4월 글 수집 현황</h1>

    <section class="summary">
      <p>업데이트 시각: <span id="updatedAt">불러오는 중...</span></p>
      <p>수집 글 수: <span id="count">-</span></p>
    </section>

    <section class="filters">
      <input id="searchInput" type="text" placeholder="작성자 또는 제목 검색" />
      <select id="menuFilter">
        <option value="">전체 메뉴</option>
        <option value="37">메뉴 37</option>
        <option value="38">메뉴 38</option>
        <option value="39">메뉴 39</option>
        <option value="40">메뉴 40</option>
      </select>
    </section>

    <table>
      <thead>
        <tr>
          <th>메뉴</th>
          <th>페이지</th>
          <th>글번호</th>
          <th>날짜</th>
          <th>작성자</th>
          <th>제목</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <script>
    let allItems = [];

    async function loadData() {
      const res = await fetch("./data/result.json?ts=" + Date.now());
      const data = await res.json();

      allItems = data.items || [];

      document.getElementById("updatedAt").textContent = data.updated_at || "-";
      document.getElementById("count").textContent = data.count || allItems.length;

      renderTable();
    }

    function renderTable() {
      const keyword = document.getElementById("searchInput").value.trim();
      const menu = document.getElementById("menuFilter").value;
      const tbody = document.getElementById("tableBody");

      const filtered = allItems.filter(item => {
        const matchMenu = !menu || String(item.menu) === menu;
        const matchKeyword =
          !keyword ||
          String(item.writer).includes(keyword) ||
          String(item.title).includes(keyword);

        return matchMenu && matchKeyword;
      });

      tbody.innerHTML = filtered.map(item => `
        <tr>
          <td>${escapeHtml(item.menu)}</td>
          <td>${escapeHtml(item.page)}</td>
          <td>${escapeHtml(item.article_number)}</td>
          <td>${escapeHtml(item.date)}</td>
          <td>${escapeHtml(item.writer)}</td>
          <td>${escapeHtml(item.title)}</td>
        </tr>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("searchInput").addEventListener("input", renderTable);
    document.getElementById("menuFilter").addEventListener("change", renderTable);

    loadData();
  </script>
</body>
</html>
