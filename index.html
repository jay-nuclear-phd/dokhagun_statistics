<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title id="pageTitle">독하군 카페 글쓰기 현황</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./dokhagun.png" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./data/result.js"></script>
</head>
<body>
  <main>
    <h1 id="mainHeading">독하군 카페 글쓰기 현황</h1>

    <section class="summary">
      <div class="summary-left">
        <span id="monthLabel">모임</span>: <span id="period">-</span>
      </div>
      <div class="summary-right">
        업데이트 시각: <span id="updatedAt">불러오는 중...</span>
      </div>
    </section>

    <section class="chart-container">
      <div id="weekToggles" class="toggles"></div>
      <div class="canvas-wrapper">
        <canvas id="activityChart"></canvas>
      </div>
    </section>

    <section class="filters">
      <input id="searchInput" type="text" placeholder="작성자 또는 제목 검색" />
    </section>

    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>작성자</th>
          <th>제목</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <script>
    let allItems = [];
    let myChart = null;
    let weeks = []; // { name, start, end }
    let activeWeekIdx = 0;

    async function loadData() {
      const updatedAtEl = document.getElementById("updatedAt");
      
      if (window.naverCafeData) {
        processData(window.naverCafeData);
        return;
      }

      try {
        const res = await fetch("./data/result.json?ts=" + Date.now());
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        processData(data);
      } catch (error) {
        console.error("데이터 로드 실패:", error);
        updatedAtEl.textContent = "불러오기 실패 (CORS 또는 파일 없음)";
        updatedAtEl.style.color = "red";
      }
    }

    function processData(data) {
      allItems = data.items || [];
      document.getElementById("updatedAt").textContent = data.updated_at || "-";

      if (data.start_date && data.end_date) {
        document.getElementById("period").textContent = `${data.start_date} ~ ${data.end_date}`;
        setupWeeks(data.start_date, data.end_date);
      }

      updateTitles();
      initChart();
      renderTable();
    }

    function setupWeeks(startStr, endStr) {
      const start = new Date(startStr);
      const end = new Date(endStr);
      weeks = [{ name: "이번 달", start: new Date(start), end: new Date(end) }];

      let currentStart = new Date(start);
      let weekNum = 1;

      while (currentStart <= end) {
        let currentEnd = new Date(currentStart);
        currentEnd.setDate(currentEnd.getDate() + 6); // 월~일 (7일)
        
        // 실제 데이터 범위 내에서만
        const actualEnd = currentEnd > end ? new Date(end) : currentEnd;
        
        weeks.push({
          name: `${weekNum}주차`,
          start: new Date(currentStart),
          end: actualEnd
        });

        currentStart.setDate(currentStart.getDate() + 7);
        weekNum++;
      }

      const togglesDiv = document.getElementById("weekToggles");
      togglesDiv.innerHTML = weeks.map((week, idx) => `
        <button class="toggle-btn ${idx === 0 ? 'active' : ''}" onclick="changePeriod(${idx})">
          ${week.name}
        </button>
      `).join("");
    }

    function initChart() {
      updateChart(0); // 기본값: 이번 달
    }

    function changePeriod(idx) {
      activeWeekIdx = idx;
      updateChart(idx);
      renderTable();
    }

    function updateChart(weekIdx) {
      const btns = document.querySelectorAll(".toggle-btn");
      btns.forEach((btn, i) => {
        btn.classList.toggle("active", i === weekIdx);
      });

      const targetWeek = weeks[weekIdx];
      
      // 목표 수치 계산
      let goal = 3; // 주차 기본값
      if (weekIdx === 0) {
        // "이번 달" 선택 시: (주차 수 * 3)
        const weekCount = weeks.length - 1;
        goal = weekCount * 3;
      }

      const filtered = allItems.filter(item => {
        if (!item.date) return false;
        const [y, m, d] = item.date.split('.').map(s => parseInt(s.trim(), 10));
        const postDate = new Date(y, m - 1, d);
        return postDate >= targetWeek.start && postDate <= targetWeek.end;
      });

      const stats = {};
      filtered.forEach(item => {
        stats[item.writer] = (stats[item.writer] || 0) + 1;
      });

      const sortedWriters = Object.entries(stats)
        .sort((a, b) => a[0].localeCompare(b[0]));

      const labels = sortedWriters.map(s => s[0]);
      const dataValues = sortedWriters.map(s => s[1]);

      // 목표 달성 여부에 따른 색상 및 투명도 설정
      const backgroundColors = dataValues.map(v => 
        v >= goal ? 'rgba(54, 162, 235, 0.8)' : 'rgba(255, 99, 132, 0.3)'
      );
      const borderColors = dataValues.map(v => 
        v >= goal ? 'rgba(54, 162, 235, 1)' : 'rgba(255, 99, 132, 0.5)'
      );

      const ctx = document.getElementById('activityChart').getContext('2d');
      if (myChart) myChart.destroy();

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '작성 글 수',
            data: dataValues,
            backgroundColor: backgroundColors,
            borderColor: borderColors,
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 },
              suggestedMax: goal + 2
            }
          },
          plugins: {
            legend: { display: false }
          }
        },
        plugins: [{
          id: 'goalLine',
          afterDraw: (chart) => {
            const { ctx, chartArea: { left, right }, scales: { y } } = chart;
            const yPos = y.getPixelForValue(goal);
            
            ctx.save();
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 99, 132, 0.8)';
            ctx.moveTo(left, yPos);
            ctx.lineTo(right, yPos);
            ctx.stroke();
            
            // 목표 텍스트 표시
            ctx.fillStyle = 'rgba(255, 99, 132, 1)';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`목표: ${goal}개`, right, yPos - 5);
            ctx.restore();
          }
        }]
      });
    }

    function updateTitles() {
      if (allItems.length === 0) return;

      const yearCount = {};
      const monthCount = {};

      allItems.forEach(item => {
        if (!item.date) return;
        // 날짜 형식: "2026.04.26."
        const parts = item.date.split('.');
        if (parts.length >= 2) {
          const year = parts[0].trim();
          const month = parseInt(parts[1], 10);
          if (year) yearCount[year] = (yearCount[year] || 0) + 1;
          if (!isNaN(month)) monthCount[month] = (monthCount[month] || 0) + 1;
        }
      });

      const bestYear = Object.keys(yearCount).reduce((a, b) => (yearCount[a] > yearCount[b] ? a : b), "");
      const bestMonth = Object.keys(monthCount).reduce((a, b) => (monthCount[a] > monthCount[b] ? a : b), "");

      if (bestYear && bestMonth) {
        document.getElementById("pageTitle").textContent = `독하군 카페 ${bestYear}년 ${bestMonth}월 모임 글쓰기 현황`;
        document.getElementById("mainHeading").textContent = `📚 독하군 카페 ${bestYear}년 ${bestMonth}월 모임 글쓰기 현황`;
        document.getElementById("monthLabel").textContent = `${bestMonth}월 모임`;
      }
    }

    function renderTable() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const tbody = document.getElementById("tableBody");

      const targetWeek = weeks[activeWeekIdx];

      const filtered = allItems.filter(item => {
        // 날짜 필터링
        if (!item.date) return false;
        const [y, m, d] = item.date.split('.').map(s => parseInt(s.trim(), 10));
        const postDate = new Date(y, m - 1, d);
        const matchPeriod = postDate >= targetWeek.start && postDate <= targetWeek.end;

        // 검색어 필터링
        const matchKeyword =
          !keyword ||
          String(item.writer || "").toLowerCase().includes(keyword) ||
          String(item.title || "").toLowerCase().includes(keyword);

        return matchPeriod && matchKeyword;
      });

      // 날짜 기준 내림차순 정렬 (최신순)
      filtered.sort((a, b) => b.date.localeCompare(a.date));

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #999;">검색 결과가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(item => `
        <tr>
          <td>${escapeHtml(item.date)}</td>
          <td>${escapeHtml(item.writer)}</td>
          <td>${escapeHtml(item.title)}</td>
        </tr>
      `).join("");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.getElementById("searchInput").addEventListener("input", renderTable);

    loadData();
  </script>
</body>
</html>
